<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora d'Estalvi Energètic</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Navegació -->
        <nav class="navbar">
            <div class="navbar-content">
                <h1 class="navbar-title">⚡ Calculadora d'Estalvi Energètic</h1>
                <div class="nav-buttons">
                    <button id="navDashboard" class="nav-btn active" data-page="dashboard">📊 Dashboard</button>
                    <button id="navAnalisis" class="nav-btn" data-page="analisis">📈 Anàlisis</button>
                    <button id="navReduction" class="nav-btn" data-page="reduction">🌱 Calculadora</button>
                </div>
            </div>
        </nav>

        <!-- Contenidor principal -->
        <main class="main-container">
            <!-- Dashboard Page -->
            <div id="dashboard-page" class="page active">
                <div id="dashboard-content"></div>
            </div>

            <!-- Analisis Page -->
            <div id="analisis-page" class="page">
                <div id="analisis-content"></div>
            </div>

            <!-- Reduction Page -->
            <div id="reduction-page" class="page">
                <div id="reduction-content"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Calculadora d'Estalvi Energètic | Desenvolupat per optimitzar recursos</p>
        </footer>
    </div>

    <script src="./app.js"></script>
</body>
</html>
